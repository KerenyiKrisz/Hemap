<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEMA edzéstérkép – Magyar Hosszúkardvívás</title>
  <meta name="description" content="Interaktív térkép a magyarországi és felvidéki HEMA (történelmi európai harcművészetek) edzéshelyszínekről. Találd meg a hozzád legközelebbi hosszúkardvívó klubot." />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="map-shell">
    <header class="map-header">
      <div class="header-mark">
        <svg class="sword-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14.5 3.5 L20.5 3.5 L20.5 9.5 L11 19 L9 17 Z" />
          <path d="M9 17 L5.5 20.5 M7 15 L3.5 18.5" />
          <path d="M8 14 L6 12 L10 8" />
        </svg>
        <div class="header-text">
          <h1>HEMA edzéstérkép</h1>
          <p>Hosszúkardvívás és történelmi vívóiskolák</p>
        </div>
      </div>
      <div class="header-controls">
        <label class="search-field">
          <input type="text" id="search" placeholder="Keress városra vagy klubra…" autocomplete="off" />
        </label>
        <span class="club-count" id="count"></span>
      </div>
    </header>

    <div id="map" role="application" aria-label="HEMA edzéshelyszínek térképe"></div>

    <footer class="map-footer">
      <span>Térképadatok © OpenStreetMap közreműködők</span>
      <span class="footer-sep">·</span>
      <a href="https://hosszukardvivas.hu/" target="_blank" rel="noopener">hosszukardvivas.hu</a>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
